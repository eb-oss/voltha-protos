---
name: PyPI release

# yamllint disable-line rule:truthy
on:
  push:
    # Only invoked on release tag pushes
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Enter the Git tag to build (e.g., v1.2.3)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # yamllint disable-line rule:line-length
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Configure Python
        # yamllint disable-line rule:line-length
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install virtualenv

      - name: Create .pypirc
        id: secret
        uses: mobiledevops/secret-to-file-action@v2
        with:
          base64-encoded-secret: ${{ secrets.DOTPYPI }}
          filename: ".pypirc"
          is-executable: false
          working-directory: ${{ env.HOME }}

      - name: Build package distribution files
        uses: ./.github/actions/pypi-publish-action
        with:
          pypi-username: ${{ secrets.PYPI_USERNAME }}
          pypi-password: ${{ secrets.PYPI_PASSWORD }}
          prep-commands: "make python-protos"
